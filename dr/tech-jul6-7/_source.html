<!doctype html><html><head><meta charset="utf-8">
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@900,700,500,400&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:1080px;height:1350px;background:#000;color:#fff;font-family:'Satoshi',-apple-system,Arial,sans-serif;-webkit-font-smoothing:antialiased}
  .card{position:relative;width:1080px;height:1350px;padding:92px 96px 84px;display:flex;flex-direction:column}
  .frame{position:absolute;inset:46px;border:1px solid #1e1e1e;border-radius:12px;pointer-events:none}
  .top{display:flex;justify-content:space-between;align-items:center;z-index:1}
  .kicker{font-size:20px;letter-spacing:.36em;text-transform:uppercase;color:#808080;font-weight:500}
  .hero{flex:1;display:flex;align-items:center;justify-content:center;z-index:1;padding:20px 0}
  .headwrap{z-index:1;min-height:170px}
  .rule{width:62px;height:4px;background:#F20A5E;border-radius:2px;margin-bottom:26px}
  .cap{font-weight:900;font-size:50px;line-height:1.08;letter-spacing:-.022em;max-width:880px}
  .cap .pk{color:#F20A5E}
  .foot{display:flex;justify-content:space-between;align-items:center;margin-top:40px;padding-top:26px;border-top:1px solid #232323;z-index:1}
  .wm{display:flex;align-items:center;gap:14px;font-weight:700;font-size:23px;color:#fff}
  .url{font-size:17px;letter-spacing:.05em;color:#6a6a6a;font-weight:500}
  svg{display:block;overflow:visible}
  .bx{fill:none;stroke:#fff;stroke-width:3.5}
  .bxg{fill:none;stroke:#3a3a3a;stroke-width:3.5}
  .bxp{fill:none;stroke:#F20A5E;stroke-width:4}
  .ln{stroke:#fff;stroke-width:3.5;fill:none;stroke-linecap:round}
  .lng{stroke:#3a3a3a;stroke-width:3.5;fill:none;stroke-linecap:round}
  .lnp{stroke:#F20A5E;stroke-width:4;fill:none;stroke-linecap:round}
  text{font-family:'Satoshi';fill:#fff}
  .tl{font-weight:700;font-size:26px}
  .tlg{font-weight:700;font-size:26px;fill:#6f6f6f}
  .tlp{font-weight:900;font-size:26px;fill:#F20A5E}
  .ts{font-weight:500;font-size:19px;fill:#7a7a7a;letter-spacing:.04em}
</style></head>
<body><div class="card">
  <div class="frame"></div>
  <div class="top"><div class="kicker" id="kick"></div>
    <svg width="28" height="28" viewBox="-34 -34 68 68"><path fill="#F20A5E" d="M0 -30 l8 19 21 2 -16 14 5 21 -18 -11 -18 11 5 -21 -16 -14 21 -2z"/></svg>
  </div>
  <div class="hero" id="hero"></div>
  <div class="headwrap"><div class="rule"></div><div class="cap" id="cap"></div></div>
  <div class="foot"><div class="wm"><svg width="21" height="21" viewBox="-34 -34 68 68"><path fill="#F20A5E" d="M0 -30 l8 19 21 2 -16 14 5 21 -18 -11 -18 11 5 -21 -16 -14 21 -2z"/></svg>potentially</div><div class="url">madeonpotentially.com</div></div>
</div>
<script>
const d=new URLSearchParams(location.search).get('d')||'ctx-a';
const K=document.getElementById('kick'),H=document.getElementById('hero'),C=document.getElementById('cap');
const arrow='<defs><marker id="ah" markerWidth="10" markerHeight="10" refX="7" refY="5" orient="auto"><path d="M0 0 L8 5 L0 10 z" fill="#fff"/></marker><marker id="ahp" markerWidth="10" markerHeight="10" refX="7" refY="5" orient="auto"><path d="M0 0 L8 5 L0 10 z" fill="#F20A5E"/></marker></defs>';
const D={
'ctx-a':{k:'CONTEXT IS THE PRODUCT · A',cap:'Same model. <span class="pk">Your context.</span> Different output.',svg:`<svg width="900" height="460" viewBox="0 0 900 460">${arrow}
  <rect x="40" y="44" width="150" height="70" rx="10" class="bxg"/><text x="115" y="86" text-anchor="middle" class="tlg">prompt</text>
  <line x1="200" y1="79" x2="300" y2="79" class="lng" marker-end="url(#ah)"/>
  <rect x="310" y="38" width="150" height="82" rx="10" class="bx"/><text x="385" y="84" text-anchor="middle" class="tl">MODEL</text>
  <line x1="470" y1="79" x2="570" y2="79" class="lng" marker-end="url(#ah)"/>
  <rect x="580" y="44" width="280" height="70" rx="10" class="bxg"/><text x="720" y="86" text-anchor="middle" class="tlg">everyone's answer</text>
  <rect x="40" y="330" width="150" height="70" rx="10" class="bxp"/><text x="115" y="372" text-anchor="middle" class="tlp">your context</text>
  <line x1="200" y1="365" x2="300" y2="365" class="lnp" marker-end="url(#ahp)"/>
  <rect x="310" y="324" width="150" height="82" rx="10" class="bx"/><text x="385" y="370" text-anchor="middle" class="tl">MODEL</text>
  <line x1="470" y1="365" x2="570" y2="365" class="lnp" marker-end="url(#ahp)"/>
  <rect x="580" y="330" width="280" height="70" rx="10" class="bxp"/><text x="720" y="372" text-anchor="middle" class="tlp">work that's yours</text>
</svg>`},
'ctx-b':{k:'CONTEXT IS THE PRODUCT · B',cap:'The layer is three things: <span class="pk">memory, your IP, your workflows.</span>',svg:`<svg width="820" height="500" viewBox="0 0 820 500">${arrow}
  <rect x="120" y="20" width="580" height="64" rx="10" class="bxp"/><text x="410" y="59" text-anchor="middle" class="tlp">MEMORY</text>
  <rect x="120" y="104" width="580" height="64" rx="10" class="bxp"/><text x="410" y="143" text-anchor="middle" class="tlp">YOUR IP &amp; ASSETS</text>
  <rect x="120" y="188" width="580" height="64" rx="10" class="bxp"/><text x="410" y="227" text-anchor="middle" class="tlp">WORKFLOWS</text>
  <line x1="410" y1="262" x2="410" y2="330" class="lnp" marker-end="url(#ahp)"/>
  <rect x="300" y="338" width="220" height="84" rx="10" class="bx"/><text x="410" y="386" text-anchor="middle" class="tl">MODEL</text>
  <text x="410" y="470" text-anchor="middle" class="ts">SAME MODEL · OUTPUT THAT'S YOURS</text>
</svg>`},
'ctx-c':{k:'CONTEXT IS THE PRODUCT · C',cap:'A prompt is a one-off. <span class="pk">Context compounds.</span>',svg:`<svg width="860" height="460" viewBox="0 0 860 460">${arrow}
  <circle cx="150" cy="300" r="12" fill="#3a3a3a"/><text x="150" y="350" text-anchor="middle" class="tlg">a prompt</text><text x="150" y="382" text-anchor="middle" class="ts">ONE-OFF</text>
  <line x1="360" y1="360" x2="820" y2="360" stroke="#222" stroke-width="2"/>
  <path d="M380 350 L480 320 L560 268 L640 196 L740 96" class="lnp"/>
  <circle cx="380" cy="350" r="7" fill="#F20A5E"/><circle cx="480" cy="320" r="7" fill="#F20A5E"/><circle cx="560" cy="268" r="7" fill="#F20A5E"/><circle cx="640" cy="196" r="7" fill="#F20A5E"/><circle cx="740" cy="96" r="9" fill="#F20A5E"/>
  <text x="760" y="92" class="tlp">your context</text>
  <text x="380" y="408" text-anchor="middle" class="ts">EVERY BRIEF · EVERY CORRECTION · EVERY NOTE</text>
</svg>`},
'rtr-a':{k:'THE ROUTER · A',cap:'You pick the outcome. <span class="pk">The router picks the model.</span>',svg:`<svg width="900" height="500" viewBox="0 0 900 500">${arrow}
  <rect x="20" y="214" width="150" height="72" rx="10" class="bx"/><text x="95" y="256" text-anchor="middle" class="tl">request</text>
  <line x1="180" y1="250" x2="290" y2="250" class="ln" marker-end="url(#ah)"/>
  <rect x="300" y="200" width="170" height="100" rx="12" class="bxp"/><text x="385" y="245" text-anchor="middle" class="tlp">ROUTER</text><text x="385" y="276" text-anchor="middle" class="ts">picks the fit</text>
  <line x1="470" y1="250" x2="600" y2="80" class="lnp" marker-end="url(#ahp)"/>
  <line x1="470" y1="250" x2="600" y2="193" class="lng" marker-end="url(#ah)"/>
  <line x1="470" y1="250" x2="600" y2="307" class="lng" marker-end="url(#ah)"/>
  <line x1="470" y1="250" x2="600" y2="420" class="lng" marker-end="url(#ah)"/>
  <rect x="610" y="48" width="240" height="64" rx="10" class="bx"/><text x="730" y="87" text-anchor="middle" class="tl">model A</text>
  <rect x="610" y="161" width="240" height="64" rx="10" class="bxg"/><text x="730" y="200" text-anchor="middle" class="tlg">model B</text>
  <rect x="610" y="274" width="240" height="64" rx="10" class="bxg"/><text x="730" y="313" text-anchor="middle" class="tlg">model C</text>
  <rect x="610" y="387" width="240" height="64" rx="10" class="bxg"/><text x="730" y="426" text-anchor="middle" class="tlg">model D</text>
  <text x="730" y="486" text-anchor="middle" class="ts">INTERCHANGEABLE</text>
</svg>`},
'rtr-b':{k:'THE ROUTER · B',cap:'Read the task. Know the models. <span class="pk">Check the result. Keep a fallback.</span>',svg:`<svg width="900" height="480" viewBox="0 0 900 480">${arrow}
  <text x="60" y="150" text-anchor="middle" class="ts">TASK</text><line x1="60" y1="170" x2="60" y2="196" class="ln" marker-end="url(#ah)"/>
  <rect x="20" y="200" width="190" height="78" rx="10" class="bx"/><text x="115" y="245" text-anchor="middle" class="tl">read task</text>
  <line x1="210" y1="239" x2="250" y2="239" class="ln" marker-end="url(#ah)"/>
  <rect x="252" y="200" width="190" height="78" rx="10" class="bx"/><text x="347" y="234" text-anchor="middle" class="tl">live model</text><text x="347" y="262" text-anchor="middle" class="tl">map</text>
  <line x1="442" y1="239" x2="482" y2="239" class="ln" marker-end="url(#ah)"/>
  <rect x="484" y="200" width="190" height="78" rx="10" class="bxp"/><text x="579" y="245" text-anchor="middle" class="tlp">quality check</text>
  <line x1="674" y1="239" x2="714" y2="239" class="ln" marker-end="url(#ah)"/>
  <text x="800" y="246" text-anchor="middle" class="tl">output</text>
  <line x1="579" y1="278" x2="579" y2="360" class="lnp" marker-end="url(#ahp)"/>
  <rect x="470" y="364" width="220" height="72" rx="10" class="bxp"/><text x="580" y="406" text-anchor="middle" class="tlp">fallback</text>
</svg>`},
'rtr-c':{k:'THE ROUTER · C',cap:'A new model drops. You add it. <span class="pk">Nothing else changes.</span>',svg:`<svg width="880" height="480" viewBox="0 0 880 480">${arrow}
  <rect x="60" y="200" width="160" height="84" rx="12" class="bxp"/><text x="140" y="248" text-anchor="middle" class="tlp">ROUTER</text>
  <line x1="220" y1="242" x2="300" y2="242" class="ln" marker-end="url(#ah)"/>
  <rect x="320" y="120" width="200" height="60" rx="30" class="bx"/><text x="420" y="157" text-anchor="middle" class="tl">model A</text>
  <rect x="320" y="210" width="200" height="60" rx="30" class="bx"/><text x="420" y="247" text-anchor="middle" class="tl">model B</text>
  <rect x="320" y="300" width="200" height="60" rx="30" class="bxg"/><text x="420" y="337" text-anchor="middle" class="tlg">model C</text>
  <rect x="560" y="55" width="240" height="60" rx="30" class="bxp" stroke-dasharray="3 9"/><text x="680" y="92" text-anchor="middle" class="tlp">+ new model</text>
  <line x1="680" y1="115" x2="560" y2="175" class="lnp" marker-end="url(#ahp)"/>
  <text x="440" y="445" text-anchor="middle" class="ts">NO REBUILD · NO MIGRATION WEEKEND</text>
</svg>`}
};
const cur=D[d];K.textContent=cur.k;C.innerHTML=cur.cap;H.innerHTML=cur.svg;
</script>
</body></html>
